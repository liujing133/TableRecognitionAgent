# 模型路径
model:
  yolo_table_path: "yolov8s.pt"
  tsr_model_path: "./models/tableformer_light/model.safetensors"
  ocr_use_gpu: false

# TEDS 阈值配置
teds_threshold:
  high: 0.85
  mid: 0.6

# 跨页配置
cross_page:
  enable: true
  sim_threshold: 0.7

# 日志配置
log:
  save_trace: true
  log_path: "./logs/trace.log"

# 输出配置
output:
  save_badcase: true
  badcase_dir: "./eval/badcase"
